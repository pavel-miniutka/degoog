name: Bug Report
description: Report a bug in Degoog
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: What version of Degoog are you using?
      placeholder: e.g. 1.2.3
    validations:
      required: false
  - type: input
    id: platform
    attributes:
      label: What platform is it deployed on?
      placeholder: e.g. Docker on Ubuntu 22.04, Node.js on Debian 12
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: What steps can reproduce the bug?
      placeholder: |
        1. Go to '...'
        2. Search for '...'
        3. Click on '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What is the expected behavior?
      placeholder: Describe what you expected to happen.
    validations:
      required: false
  - type: textarea
    id: actual
    attributes:
      label: What do you see instead?
      placeholder: Describe what actually happened.
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional information
      placeholder: Any other context, screenshots, or logs that might help.
    validations:
      required: false
