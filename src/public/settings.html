<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="degoog search settings.">
  <link rel="icon" href="/public/favicon/favicon.ico" type="image/x-icon">
  <link rel="manifest" href="/public/favicon/site.webmanifest">
  <title>Settings – degoog</title>
  <link rel="stylesheet" href="/public/style.css">
  __THEME_CSS__
</head>
<body class="settings-page-body">
  <div class="settings-page">
    <header class="settings-page-header">
      <a href="/" class="settings-page-back">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back
      </a>
      <h1 class="settings-page-title">Settings</h1>
    </header>

    <nav class="settings-tabs-nav" id="settings-tabs-nav">
      <button class="settings-tab-btn active" data-tab="general" type="button">General</button>
      <button class="settings-tab-btn" data-tab="engines" type="button">Engines</button>
      <button class="settings-tab-btn" data-tab="plugins" type="button">Plugins</button>
      <button class="settings-tab-btn" data-tab="themes" type="button">Themes</button>
      <button class="settings-tab-btn" data-tab="store" type="button">Store</button>
    </nav>

    <main class="settings-page-main">
      <div class="settings-tab-panel active" id="tab-general">
        <section class="settings-section">
          <h2 class="settings-section-heading">Appearance</h2>
          <p class="settings-desc">Choose your preferred theme.</p>
          <div class="theme-select-wrap">
            <select id="theme-select" class="theme-select">
              <option value="system">System default</option>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </div>
        </section>

        <section class="settings-section">
          <h2 class="settings-section-heading">Cache</h2>
          <p class="settings-desc">Clear stored search results.</p>
          <button class="settings-cache-clear" id="settings-cache-clear" type="button">Clear search cache</button>
        </section>

        <section class="settings-section">
          <h2 class="settings-section-heading">Install app</h2>
          <p class="settings-desc">Add degoog to your home screen. If your browser did not show the install prompt, use this to try again.</p>
          <button class="settings-install-prompt" id="settings-install-prompt" type="button">Show install prompt</button>
        </section>

        <div class="settings-page-actions">
          <button class="settings-save" id="settings-save" type="button">Save</button>
        </div>
      </div>

      <div class="settings-tab-panel" id="tab-engines">
        <div id="engines-content"></div>
      </div>

      <div class="settings-tab-panel" id="tab-plugins">
        <div id="plugins-content"></div>
      </div>

      <div class="settings-tab-panel" id="tab-themes">
        <div id="themes-content"></div>
      </div>
      <div class="settings-tab-panel" id="tab-store">
        <div id="store-content"></div>
      </div>
    </main>
  </div>

  <div class="ext-modal-overlay" id="ext-modal-overlay" style="display:none">
    <div class="ext-modal" id="ext-modal" role="dialog" aria-modal="true">
      <div class="ext-modal-header">
        <h2 class="ext-modal-title" id="ext-modal-title"></h2>
        <button class="ext-modal-close" id="ext-modal-close" type="button" aria-label="Close">&times;</button>
      </div>
      <div class="ext-modal-body" id="ext-modal-body"></div>
      <div class="ext-modal-footer">
        <span class="ext-modal-status" id="ext-modal-status"></span>
        <button class="settings-save" id="ext-modal-save" type="button">Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="/public/settings-page.js"></script>
</body>
</html>
