<!doctype html>
<html lang="en" __THEME_ATTRS__>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="{{t:settings-page.meta.description}}"
    />
    <link
      rel="icon"
      href="/public/favicon/favicon.ico?v=__APP_VERSION__"
      type="image/x-icon"
    />
    <link
      rel="manifest"
      href="/public/favicon/site.webmanifest"
      crossorigin="use-credentials"
    />
    <title>{{t:settings-page.meta.title}}</title>
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        var r = document.documentElement;
        if (t === "light") r.setAttribute("data-theme", "light");
        else if (t === "dark") r.setAttribute("data-theme", "dark");
        else {
          var m = window.matchMedia("(prefers-color-scheme: dark)");
          r.setAttribute("data-theme", m.matches ? "dark" : "light");
        }
      })();
    </script>
    <link
      rel="preload"
      href="/public/themes/degoog-theme/fonts/google-sans/static/GoogleSans-Medium.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link
      rel="stylesheet"
      href="/public/themes/degoog-theme/style.css?v=__APP_VERSION__"
    />
    __THEME_CSS__
    <script>
      window.__DEGOOG_PUBLIC_INSTANCE__ = true;
    </script>
  </head>
  <body class="settings-page-body">
    <div class="settings-page">
      <header class="settings-page-header">
        <a href="/" class="settings-page-back">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
          {{t:settings-page.back}}
        </a>
        <h1 class="settings-page-title">{{t:settings-page.page-title}}</h1>
      </header>

      <main class="settings-page-main">
        <section class="settings-section">
          <h2 class="settings-section-heading">{{t:settings-page.appearance.heading}}</h2>
          <p class="settings-desc">{{t:settings-page.appearance.desc}}</p>
          <div class="theme-select-wrap">
            <select id="theme-select" class="theme-select">
              <option value="system">{{t:settings-page.theme.system}}</option>
              <option value="light">{{t:settings-page.theme.light}}</option>
              <option value="dark">{{t:settings-page.theme.dark}}</option>
            </select>
          </div>
        </section>

        <section class="settings-section">
          <h2 class="settings-section-heading">{{t:settings-page.search-options.heading}}</h2>
          <label class="settings-toggle-wrap" style="margin-top: 1rem">
            <input
              type="checkbox"
              id="settings-open-new-tab"
              class="settings-toggle"
              aria-label="{{t:settings-page.search-options.open-new-tab-aria}}"
            />
            <span class="toggle-slider"></span>
            <span class="settings-toggle-label"
              >{{t:settings-page.search-options.open-new-tab}}</span
            >
          </label>

          <label class="settings-toggle-wrap" style="margin-top: 1rem">
            <input
              type="checkbox"
              id="display-engine-performance"
              class="settings-toggle"
              aria-label="{{t:settings-page.search-options.engine-performance-aria}}"
            />
            <span class="toggle-slider"></span>
            <span class="settings-toggle-label"
              >{{t:settings-page.search-options.engine-performance}}</span
            >
          </label>

          <label class="settings-toggle-wrap" style="margin-top: 1rem">
            <input
              type="checkbox"
              id="display-search-suggestions"
              class="settings-toggle"
              aria-label="{{t:settings-page.search-options.search-suggestions-aria}}"
            />
            <span class="toggle-slider"></span>
            <span class="settings-toggle-label"
              >{{t:settings-page.search-options.search-suggestions}}</span
            >
          </label>

          <label
            class="settings-toggle-wrap"
            style="margin-top: 1rem"
            title="{{t:settings-page.search-options.post-method-tooltip}}"
          >
            <input
              type="checkbox"
              id="settings-post-method-enabled"
              class="settings-toggle"
              aria-label="{{t:settings-page.search-options.post-method-aria}}"
            />
            <span class="toggle-slider"></span>
            <span class="settings-toggle-label"
              >{{t:settings-page.search-options.post-method}}</span
            >
          </label>
        </section>

        <section class="settings-section">
          <h2 class="settings-section-heading">{{t:settings-page.public.engines-heading}}</h2>
          <div id="engines-content"></div>
        </section>
      </main>
    </div>

    <script
      type="module"
      src="/public/settings-page.js?v=__APP_VERSION__"
    ></script>
  </body>
</html>
