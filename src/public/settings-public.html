<!doctype html>
<html lang="en" __THEME_ATTRS__>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="degoog search settings." />
    <link
      rel="icon"
      href="/public/favicon/favicon.ico?v=__APP_VERSION__"
      type="image/x-icon"
    />
    <link
      rel="manifest"
      href="/public/favicon/site.webmanifest"
      crossorigin="use-credentials"
    />
    <title>Settings – degoog</title>
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        var r = document.documentElement;
        if (t === "light") r.setAttribute("data-theme", "light");
        else if (t === "dark") r.setAttribute("data-theme", "dark");
        else {
          var m = window.matchMedia("(prefers-color-scheme: dark)");
          r.setAttribute("data-theme", m.matches ? "dark" : "light");
        }
      })();
    </script>
    <link
      rel="preload"
      href="/public/themes/degoog-theme/fonts/google-sans/static/GoogleSans-Medium.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link
      rel="stylesheet"
      href="/public/themes/degoog-theme/style.css?v=__APP_VERSION__"
    />
    __THEME_CSS__
    <script>
      window.__DEGOOG_PUBLIC_INSTANCE__ = true;
    </script>
  </head>
  <body class="settings-page-body">
    <div class="settings-page">
      <header class="settings-page-header">
        <a href="/" class="settings-page-back">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
          Back
        </a>
        <h1 class="settings-page-title">Settings</h1>
      </header>

      <main class="settings-page-main">
        <section class="settings-section">
          <h2 class="settings-section-heading">Appearance</h2>
          <p class="settings-desc">Choose your preferred theme.</p>
          <div class="theme-select-wrap">
            <select id="theme-select" class="theme-select">
              <option value="system">System default</option>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </div>
        </section>

        <section class="settings-section">
          <h2 class="settings-section-heading">Search Options</h2>
          <label class="settings-toggle-wrap" style="margin-top: 1rem">
            <input
              type="checkbox"
              id="settings-open-new-tab"
              class="settings-toggle"
              aria-label="Open result links in new tab"
            />
            <span class="toggle-slider"></span>
            <span class="settings-toggle-label"
              >Open result links in new tab</span
            >
          </label>

          <label class="settings-toggle-wrap" style="margin-top: 1rem">
            <input
              type="checkbox"
              id="display-engine-performance"
              class="settings-toggle"
              aria-label="Display engine performance"
            />
            <span class="toggle-slider"></span>
            <span class="settings-toggle-label"
              >Display engine performance</span
            >
          </label>

          <label class="settings-toggle-wrap" style="margin-top: 1rem">
            <input
              type="checkbox"
              id="display-search-suggestions"
              class="settings-toggle"
              aria-label="Display search suggestions"
            />
            <span class="toggle-slider"></span>
            <span class="settings-toggle-label"
              >Display search suggestions</span
            >
          </label>
        </section>

        <section class="settings-section">
          <h2 class="settings-section-heading">Engines</h2>
          <div id="engines-content"></div>
        </section>
      </main>
    </div>

    <script
      type="module"
      src="/public/settings-page.js?v=__APP_VERSION__"
    ></script>
  </body>
</html>
