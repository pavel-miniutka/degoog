<!doctype html>
<html lang="en" __THEME_ATTRS__ __RTL_SUPPORT__>
  <head>
    <script>
      (function () {
        var r = document.documentElement;
        var t = localStorage.getItem("theme");
        if (t === "light") r.setAttribute("data-theme", "light");
        else if (t === "dark") r.setAttribute("data-theme", "dark");
        else {
          var m = window.matchMedia("(prefers-color-scheme: dark)");
          r.setAttribute("data-theme", m.matches ? "dark" : "light");
        }
        try {
          var req = indexedDB.open("degoog", 2);
          req.onsuccess = function () {
            try {
              var db = req.result;
              if (!db.objectStoreNames.contains("settings")) return;
              var tx = db.transaction("settings", "readonly");
              var store = tx.objectStore("settings");
              var get = store.get("theme");
              get.onsuccess = function () {
                var v = get.result;
                if (v === "light") r.setAttribute("data-theme", "light");
                else if (v === "dark") r.setAttribute("data-theme", "dark");
                else {
                  var m2 = window.matchMedia("(prefers-color-scheme: dark)");
                  r.setAttribute("data-theme", m2.matches ? "dark" : "light");
                }
              };
            } catch (e) {}
          };
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="{{t:settings-page.meta.description}}"
    />
    <link
      rel="icon"
      href="/public/favicon/favicon.ico?v=__APP_VERSION__"
      type="image/x-icon"
    />
    <link
      rel="manifest"
      href="/public/favicon/site.webmanifest" crossorigin="use-credentials"
    />
    <title>{{t:settings-page.meta.title}}</title>
    <link
      rel="preload"
      href="/public/themes/degoog-theme/fonts/google-sans/static/GoogleSans-Medium.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link rel="stylesheet" href="/public/themes/degoog-theme/style.css?v=__APP_VERSION__" />
    __THEME_CSS__ __CUSTOM_CSS__
  </head>
  <body class="settings-page-body">
    <div class="settings-page">
      <header class="settings-page-header">
        <a href="/" class="settings-page-back">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
          {{t:settings-page.back}}
        </a>
        <h1 class="settings-page-title">{{t:settings-page.page-title}}</h1>
      </header>
      <div class="settings-auth-gate">
        <div class="settings-auth-gate-inner">
          <p class="settings-auth-desc">
            {{t:settings-page.gate.desc}}
          </p>
          <form
            class="settings-auth-form"
            id="settings-auth-form"
            autocomplete="off"
          >
            <input
              class="settings-auth-input"
              type="password"
              id="settings-auth-input"
              placeholder="{{t:settings-page.gate.password-placeholder}}"
              autocomplete="current-password"
              autofocus
            />
            <button class="settings-auth-submit" type="submit">{{t:settings-page.gate.unlock}}</button>
          </form>
          <p class="settings-auth-error" id="settings-auth-error"></p>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var t = window.scopedT("core");
        const TOKEN_KEY = "degoog-settings-token";
        const form = document.getElementById("settings-auth-form");
        const errorEl = document.getElementById("settings-auth-error");
        form.addEventListener("submit", async function (e) {
          e.preventDefault();
          const password = document.getElementById("settings-auth-input").value;
          errorEl.textContent = "";
          try {
            const res = await fetch("/api/settings/auth", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ password }),
              credentials: "same-origin",
            });
            const data = await res.json();
            if (data.ok && data.token) {
              sessionStorage.setItem(TOKEN_KEY, data.token);
              window.location.reload();
            } else {
              errorEl.textContent = t("settings-page.gate.incorrect-password");
            }
          } catch {
            errorEl.textContent = t("settings-page.gate.network-error");
          }
        });
      })();
    </script>
  </body>
</html>
