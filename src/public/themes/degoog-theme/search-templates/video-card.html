<div class="video-thumb-wrap">
  <img
    class="video-thumb"
    src="{{ thumbnail_url }}"
    alt="{{ title }}"
    loading="lazy"
    onerror="this.style.display='none';this.parentElement.querySelector('.video-play-icon').style.opacity='1'"
  />
  {{#if duration}}<span class="video-duration">{{ duration }}</span>{{/if duration}}
  <div class="video-play-icon">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="white">
      <polygon points="5 3 19 12 5 21 5 3" />
    </svg>
  </div>
</div>
<div class="video-info">
  <span class="video-title">{{ title }}</span>
  <span class="video-source">{{ hostname }}</span>
</div>
