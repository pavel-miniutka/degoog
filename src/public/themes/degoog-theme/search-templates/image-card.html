<div class="image-thumb-wrap">
  <img
    class="image-thumb"
    src="{{ thumbnail_url }}"
    alt="{{ title }}"
    loading="lazy"
    onerror="this.parentElement.parentElement.style.display='none'"
  />
</div>
<div class="image-info">
  <span class="image-title">{{ title }}</span>
  <span class="image-source">{{ hostname }}</span>
</div>
